<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayut Studios | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #0d9488;
            --accent-soft: rgba(13, 148, 136, 0.08);
            --text-dark: #0f172a;
            --text-slate: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--text-dark);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }

        /* --- GLASS SIDEBAR --- */
        .sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            height: fit-content;
            box-shadow: var(--shadow);
            position: sticky;
            top: 40px;
        }

        .brand {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand::before {
            content: '';
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 3px;
        }

        .section-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            color: var(--text-slate);
            margin-bottom: 20px;
            display: block;
        }

        .control-group {
            margin-bottom: 24px;
        }

        .control-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.5);
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            transition: 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        /* --- MAIN CONTENT --- */
        .main {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px;
            box-shadow: var(--shadow);
        }

        /* --- BUILDER GRID --- */
        .builder-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 80px auto;
            gap: 15px;
            align-items: flex-end;
        }

        .btn-primary {
            background: var(--text-dark);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            background: #000;
        }

        /* --- LIST STYLING --- */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .currency-pills {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
            gap: 4px;
        }

        .pill {
            border: none;
            background: transparent;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--text-slate);
            transition: 0.2s;
        }

        .pill.active {
            background: white;
            color: var(--accent);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .item-card {
            background: rgba(255,255,255,0.4);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 18px 22px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-title { font-weight: 700; font-size: 0.95rem; display: block; }
        .item-meta { font-size: 0.75rem; color: var(--text-slate); margin-top: 4px; }

        .price-tag { font-weight: 800; font-size: 1rem; color: var(--text-dark); }

        .btn-del {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.2rem;
            cursor: pointer;
            padding-left: 15px;
        }
        .btn-del:hover { color: #f43f5e; }

        /* --- TOTAL BOX --- */
        .summary-box {
            margin-top: 30px;
            text-align: right;
            padding-top: 25px;
            border-top: 1px dashed #cbd5e1;
        }

        .grand-total {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -1px;
            margin: 5px 0;
        }

        .sub-prices {
            color: var(--text-slate);
            font-size: 0.85rem;
            font-weight: 500;
        }

        @media print {
            body { background: white; padding: 0; }
            .sidebar, .builder-grid, .currency-pills, .btn-del { display: none !important; }
            .container { display: block; }
            .card { box-shadow: none; border: 1px solid #eee; }
        }
    </style>
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="brand">BAYUT STUDIOS</div>
            
            <span class="section-label">Global Multipliers</span>
            
            <div class="control-group">
                <label>Project Margin (%)</label>
                <input type="number" id="marginInput" value="7" step="0.5">
            </div>

            <div class="control-group">
                <label>Client Discount (%)</label>
                <input type="number" id="discountInput" value="0" step="0.5">
            </div>

            <div style="margin-top: 50px;">
                <span class="section-label">Server Status</span>
                <div style="display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 600; color: var(--accent);">
                    <span style="width: 8px; height: 8px; background: var(--accent); border-radius: 50%;"></span>
                    Live Connection
                </div>
            </div>
        </aside>

        <main class="main">
            <div class="card">
                <span class="section-label">Inventory Builder</span>
                <div class="builder-grid">
                    <div class="control-group" style="margin:0">
                        <label>Category</label>
                        <select id="catSelect" onchange="updateProducts()"><option>Loading...</option></select>
                    </div>
                    <div class="control-group" style="margin:0">
                        <label>Product</label>
                        <select id="prodSelect"></select>
                    </div>
                    <div class="control-group" style="margin:0">
                        <label>Qty</label>
                        <input type="number" id="unitInput" value="1" min="1">
                    </div>
                    <button class="btn-primary" onclick="addToQuote()">Add Item</button>
                </div>
            </div>

            <div class="card">
                <div class="header-row">
                    <span class="section-label" style="margin:0">Project Valuation</span>
                    <div class="currency-pills">
                        <button id="btn-PKR" class="pill active" onclick="setCurrency('PKR')">PKR</button>
                        <button id="btn-USD" class="pill" onclick="setCurrency('USD')">USD</button>
                        <button id="btn-SAR" class="pill" onclick="setCurrency('SAR')">SAR</button>
                        <button id="btn-AED" class="pill" onclick="setCurrency('AED')">AED</button>
                    </div>
                </div>

                <div id="cartList">
                    </div>

                <div id="valuationBox" style="display:none;" class="summary-box">
                    <span class="section-label">Estimated Total Valuation</span>
                    <div id="mainTotal" class="grand-total">PKR 0</div>
                    <div id="subTotals" class="sub-prices"></div>
                    <button class="btn-primary" style="margin-top: 20px;" onclick="window.print()">Export Quotation PDF</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SHEET_ID = '1qvBKlYH7q4dXsu7tEh9OLnKSydfONNRzGa-xjUYLB0g';
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        let db = [], cart = [], activeCur = 'PKR';

        function parseCell(cell) {
            if (!cell) return 0;
            let val = cell.f ? cell.f : String(cell.v);
            return parseFloat(val.replace(/[^0-9.]/g, '')) || 0;
        }

        fetch(DATA_URL).then(r => r.text()).then(t => {
            const data = JSON.parse(t.substr(47).slice(0, -2));
            db = data.table.rows.map(r => {
                const c = r.c;
                return c[0] && c[1] ? { cat: c[0].v, name: c[1].v, bQty: parseCell(c[2]) || 1, pkr: parseCell(c[4]), usd: parseCell(c[5]), sar: parseCell(c[6]), aed: parseCell(c[7]) } : null;
            }).filter(x => x);
            const cats = [...new Set(db.map(i => i.cat))];
            document.getElementById('catSelect').innerHTML = '<option value="">Select Category</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
        });

        function updateProducts() {
            const cat = document.getElementById('catSelect').value;
            document.getElementById('prodSelect').innerHTML = db.filter(i => i.cat === cat).map(i => `<option value="${i.name}">${i.name}</option>`).join('');
        }

        function setCurrency(code) {
            activeCur = code;
            document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + code).classList.add('active');
            render();
        }

        function addToQuote() {
            const name = document.getElementById('prodSelect').value;
            const qty = parseInt(document.getElementById('unitInput').value) || 1;
            const item = db.find(i => i.name === name);
            const margin = parseFloat(document.getElementById('marginInput').value) || 0;
            const discount = parseFloat(document.getElementById('discountInput').value) || 0;

            if(item) {
                cart.push({ ...item, qty, savedMargin: margin, savedDiscount: discount });
                render();
            }
        }

        function render() {
            const list = document.getElementById('cartList');
            const valBox = document.getElementById('valuationBox');
            list.innerHTML = '';
            let sums = { pkr: 0, usd: 0, sar: 0, aed: 0 };

            if(cart.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:40px; color:#94a3b8; font-size:0.9rem;">Your project list is empty. Add items to begin valuation.</div>';
                valBox.style.display = 'none';
                return;
            }

            valBox.style.display = 'block';

            cart.forEach((item, idx) => {
                const snapshotMulti = ((1 + (item.savedMargin / 100)) / 1.07) * (1 - (item.savedDiscount / 100));
                const p = (item.pkr / item.bQty) * snapshotMulti * item.qty;
                const u = (item.usd / item.bQty) * snapshotMulti * item.qty;
                const s = (item.sar / item.bQty) * snapshotMulti * item.qty;
                const a = (item.aed / item.bQty) * snapshotMulti * item.qty;
                
                sums.pkr += p; sums.usd += u; sums.sar += s; sums.aed += a;

                const displayVal = activeCur === 'PKR' ? Math.round(p).toLocaleString() : (sums[activeCur.toLowerCase()] / sums.pkr * p).toFixed(2);
                
                list.innerHTML += `
                <div class="item-card">
                    <div>
                        <span class="item-title">${item.name}</span>
                        <div class="item-meta">Qty: ${item.qty} · Margin: ${item.savedMargin}% · Disc: ${item.savedDiscount}%</div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span class="price-tag">${activeCur} ${displayVal}</span>
                        <button class="btn-del" onclick="cart.splice(${idx},1);render()">×</button>
                    </div>
                </div>`;
            });

            const mainTotalDisplay = activeCur === 'PKR' ? `PKR ${Math.round(sums.pkr).toLocaleString()}` : `${activeCur} ${sums[activeCur.toLowerCase()].toFixed(2)}`;
            document.getElementById('mainTotal').innerText = mainTotalDisplay;
            document.getElementById('subTotals').innerText = `SAR ${sums.sar.toFixed(2)}  ·  AED ${sums.aed.toFixed(2)}  ·  USD ${sums.usd.toFixed(2)}`;
        }
    </script>
</body>
</html>
